name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate stable tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          if [[ "$(git rev-list -n 1 "$GITHUB_REF_NAME")" != "$GITHUB_SHA" ]]; then
            echo "Checked-out commit does not match release tag" >&2
            exit 1
          fi

      - name: Verify formatting
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "The following files require gofmt:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build and validate release assets
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/gloss-release"
          mkdir -m 700 "$artifact_dir"
          scripts/build-release.sh "$GITHUB_REF_NAME" "$artifact_dir"
          {
            echo "ARTIFACT_DIR=$artifact_dir"
          } >> "$GITHUB_ENV"

      - name: Refuse an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          releases="$RUNNER_TEMP/releases-before-create.json"
          existing_ids="$RUNNER_TEMP/existing-release-ids.txt"
          gh api --paginate --slurp \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" > "$releases"
          jq -r --arg tag "$GITHUB_REF_NAME" \
            '.[][] | select(.tag_name == $tag) | .id' \
            "$releases" > "$existing_ids"

          mapfile -t matches < "$existing_ids"
          if ((${#matches[@]} != 0)); then
            echo "Release $GITHUB_REF_NAME already exists; refusing to replace it" >&2
            printf 'Matching release ID: %s\n' "${matches[@]}" >&2
            exit 1
          fi

      - name: Create and verify draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "$ARTIFACT_DIR/gloss-darwin-amd64.zip" \
            "$ARTIFACT_DIR/gloss-darwin-arm64.zip" \
            "$ARTIFACT_DIR/gloss-linux-amd64.zip" \
            "$ARTIFACT_DIR/gloss-linux-arm64.zip" \
            "$ARTIFACT_DIR/checksums.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --draft \
            --title "Gloss $GITHUB_REF_NAME" \
            --generate-notes

          releases="$RUNNER_TEMP/releases-after-create.json"
          draft_ids="$RUNNER_TEMP/draft-release-ids.txt"
          gh api --paginate --slurp \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" > "$releases"
          jq -r --arg tag "$GITHUB_REF_NAME" \
            '.[][] | select(.tag_name == $tag and .draft == true) | .id' \
            "$releases" > "$draft_ids"

          mapfile -t matches < "$draft_ids"
          if ((${#matches[@]} != 1)); then
            echo "Expected exactly one draft release for $GITHUB_REF_NAME; found ${#matches[@]}" >&2
            if ((${#matches[@]} > 0)); then
              printf 'Matching draft release ID: %s\n' "${matches[@]}" >&2
            fi
            exit 1
          fi
          release_id="${matches[0]}"
          if [[ ! "$release_id" =~ ^[1-9][0-9]*$ ]]; then
            echo "Draft release ID is not a positive integer: $release_id" >&2
            exit 1
          fi

          expected="$RUNNER_TEMP/expected-assets.txt"
          actual="$RUNNER_TEMP/actual-assets.txt"
          printf '%s\n' \
            checksums.txt \
            gloss-darwin-amd64.zip \
            gloss-darwin-arm64.zip \
            gloss-linux-amd64.zip \
            gloss-linux-arm64.zip > "$expected"
          gh api \
            "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            --jq '.assets[].name' | sort > "$actual"
          if ! cmp -s "$expected" "$actual"; then
            echo "Draft release asset set is incomplete or unexpected" >&2
            diff -u "$expected" "$actual" >&2 || true
            exit 1
          fi
          echo "RELEASE_ID=$release_id" >> "$GITHUB_ENV"

      - name: Publish verified release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "Verified release ID is missing or invalid: ${RELEASE_ID:-<empty>}" >&2
            exit 1
          fi
          gh api \
            --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false \
            -f make_latest=true \
            --jq '.id'
